<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F2EBE0">
  <title>Terapia Rosa · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Italiana&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app">
    <!-- Decoraciones -->
    <svg class="blob" style="top: -50px; right: -80px; opacity: 0.7;" width="260" height="200" viewBox="0 0 260 200">
      <ellipse cx="130" cy="100" rx="120" ry="80" fill="#D8C0B0" opacity="0.6"/>
    </svg>

    <!-- Top bar -->
    <header class="top-bar">
      <div class="brand">
        <svg width="32" height="32" viewBox="0 0 60 60">
          <g transform="translate(30 28)">
            <ellipse cx="0" cy="-13" rx="8" ry="13" fill="#C9968A" opacity="0.92"/>
            <ellipse cx="0" cy="-13" rx="8" ry="13" fill="#C9968A" opacity="0.92" transform="rotate(72)"/>
            <ellipse cx="0" cy="-13" rx="8" ry="13" fill="#C9968A" opacity="0.92" transform="rotate(144)"/>
            <ellipse cx="0" cy="-13" rx="8" ry="13" fill="#C9968A" opacity="0.92" transform="rotate(216)"/>
            <ellipse cx="0" cy="-13" rx="8" ry="13" fill="#C9968A" opacity="0.92" transform="rotate(288)"/>
            <circle r="6" fill="#F2EBE0"/>
            <circle r="3" fill="#A8AE93" opacity="0.9"/>
          </g>
        </svg>
        <div class="brand-text">TERAPIA<span class="accent">rosa</span></div>
      </div>
      <button class="icon-btn" aria-label="Notificaciones">🔔</button>
    </header>

    <!-- Saludo -->
    <section class="greeting">
      <div class="greeting-eyebrow" id="greetingEyebrow">Hoy</div>
      <h1 class="greeting-title">
        <span id="greetingHello">Hola</span>,<br>
        <span class="upright">respiremos juntas</span>
      </h1>
    </section>

    <!-- Frase del día -->
    <section class="frase-card fade-in">
      <div class="deco">
        <svg width="130" height="130" viewBox="0 0 100 100">
          <g transform="translate(50 50)">
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85"/>
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85" transform="rotate(60)"/>
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85" transform="rotate(120)"/>
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85" transform="rotate(180)"/>
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85" transform="rotate(240)"/>
            <ellipse cx="0" cy="-22" rx="14" ry="22" fill="#F2EBE0" opacity="0.85" transform="rotate(300)"/>
          </g>
        </svg>
      </div>
      <div class="label">Frase del día</div>
      <div class="quote" id="fraseTexto">"..."</div>
      <div class="author" id="fraseAutor">— ...</div>
    </section>

    <!-- Section: Qué necesitas ahora -->
    <div class="section-header">
      <h2 class="section-title">Qué necesitas ahora?</h2>
      <span class="section-link section-link-italic">elige con calma</span>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <!-- Generado por JS -->
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    // ─── Saludo dinámico ────────────────────────────────────
    document.getElementById('greetingEyebrow').textContent = `Hoy, ${diaSemana()}`;
    const nombreGuardado = Storage.get('nombre', '');
    document.getElementById('greetingHello').textContent =
      nombreGuardado ? `${saludoHora()}, ${nombreGuardado}` : saludoHora();

    // ─── Frase del día ──────────────────────────────────────
    const frase = fraseDelDia();
    document.getElementById('fraseTexto').textContent = `"${frase.texto}"`;
    document.getElementById('fraseAutor').textContent = `— ${frase.autor}`;

    // ─── Tarjetas de navegación ─────────────────────────────
    const cards = [
      { href: 'chat.html', title: 'Habla con Alma', sub: 'Una amiga que escucha',
        bg: '#E8CFC4', accent: '#8B5E4C',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <path d="M14 18 Q14 12 20 12 L40 12 Q46 12 46 18 L46 32 Q46 38 40 38 L26 38 L18 44 L18 38 Q14 38 14 32 Z" fill="#8B5E4C" opacity="0.85"/>
          <circle cx="24" cy="25" r="2" fill="#F2EBE0"/>
          <circle cx="30" cy="25" r="2" fill="#F2EBE0"/>
          <circle cx="36" cy="25" r="2" fill="#F2EBE0"/>
        </svg>` },
      { href: 'biblioteca.html', title: 'Aprende', sub: 'A tu propio ritmo',
        bg: '#E8DECE', accent: '#878D75',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <path d="M12 16 L12 46 L30 42 L48 46 L48 16 L30 12 Z" fill="#878D75" opacity="0.85"/>
          <path d="M30 12 L30 42" stroke="#F2EBE0" stroke-width="1.5"/>
        </svg>` },
      { href: 'bienestar.html', title: 'Yoga & medita', sub: 'Mueve y aquieta',
        bg: '#DDD0BC', accent: '#C9968A',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="14" r="5" fill="#C9968A"/>
          <path d="M30 22 Q30 30 30 36" stroke="#C9968A" stroke-width="3" stroke-linecap="round"/>
          <path d="M30 36 Q18 38 12 46 M30 36 Q42 38 48 46" stroke="#C9968A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M30 36 Q22 42 14 42 M30 36 Q38 42 46 42" stroke="#C9968A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>` },
      { href: 'respiracion.html', title: 'Respira', sub: '5 minutos para ti',
        bg: '#D8DCC4', accent: '#878D75',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="20" stroke="#878D75" stroke-width="2.5" fill="#878D75" fill-opacity="0.18"/>
          <circle cx="30" cy="30" r="13" stroke="#878D75" stroke-width="1.8" fill="none" opacity="0.6"/>
          <circle cx="30" cy="30" r="6" fill="#878D75"/>
        </svg>` },
      { href: 'colorear.html', title: 'Colorear', sub: 'Pinta sin pensar',
        bg: '#D8C0B0', accent: '#8B5E4C',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <path d="M14 46 Q10 38 16 32 L34 14 Q40 8 46 14 Q52 20 46 26 L28 44 Q22 50 14 46 Z" fill="#8B5E4C" opacity="0.9"/>
          <ellipse cx="20" cy="42" rx="4" ry="3" fill="#F2EBE0"/>
        </svg>` },
      { href: 'mi-espacio.html', title: 'Mi espacio', sub: 'Diario, juegos, muro',
        bg: '#D4AFA0', accent: '#8B5E4C',
        svg: `<svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <rect x="14" y="14" width="32" height="36" rx="3" fill="#8B5E4C" opacity="0.85"/>
          <line x1="20" y1="22" x2="40" y2="22" stroke="#F2EBE0" stroke-width="1.5"/>
          <line x1="20" y1="28" x2="40" y2="28" stroke="#F2EBE0" stroke-width="1.5"/>
          <line x1="20" y1="34" x2="36" y2="34" stroke="#F2EBE0" stroke-width="1.5"/>
        </svg>` },
    ];

    document.getElementById('cardsGrid').innerHTML = cards.map(c => `
      <a href="${c.href}" class="nav-card" style="background: ${c.bg};">
        <div class="icon-wrap">${c.svg}</div>
        <div>
          <div class="title">${c.title}</div>
          <div class="sub">${c.sub}</div>
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
