<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F2EBE0">
  <title>Sopa de palabras · Terapia Rosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Italiana&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="juegos.html" class="back-btn" aria-label="Volver">←</a>
      <div>
        <div class="page-eyebrow">Sin presión, a tu ritmo</div>
        <div class="page-title">Sopa de palabras</div>
      </div>
    </header>

    <div class="game-container">
      <div class="progress">Encuentra las palabras: <span id="foundCount">0</span> de <span id="totalCount">0</span></div>
      <div class="word-list" id="wordList"></div>
      <div class="sopa-grid" id="sopaGrid"></div>
      <div class="actions">
        <button class="btn btn-soft" id="newGameBtn">↻ Nueva sopa</button>
      </div>
    </div>

  </div>
  <script src="js/utils.js"></script>
  <script src="js/sopa.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    document.getElementById('newGameBtn').addEventListener('click', newSopa);
    newSopa();
  </script>
</body>
</html>
